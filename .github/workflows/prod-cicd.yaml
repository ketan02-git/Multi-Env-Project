name: CI/CD Pipeline

on:
  push:
    branches:
      - prod

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: prod-app/package-lock.json

    - name: Install Dependencies
      working-directory: prod-app
      run: npm install

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      run: |
        TAG=${GITHUB_SHA::7}
        IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/simple-node-app"

        docker build -t $IMAGE_NAME:$TAG ./prod-app
        docker push $IMAGE_NAME:$TAG

        echo "NEW_TAG=$TAG" >> $GITHUB_ENV

    - name: Install yq (for safe YAML edit)
      run: |
        sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
        sudo chmod +x /usr/bin/yq

    - name: Update Helm values.yaml
      run: |
        yq e -i '.image.tag = strenv(NEW_TAG)' node-app/values.yaml

    - name: Commit and Push Updated Manifest
      run: |
        git config user.name "ketan02-git"
        git config user.email "ambureketan@gmail.com"
    
        git add helm/values.yaml
        git commit -m "chore: update image tag to $NEW_TAG" || exit 0
        git push origin ${GITHUB_REF_NAME}
